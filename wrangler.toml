name = "thoughts"
main = "src/worker.ts"
compatibility_date = "2025-05-26"

[vars]
CHANNEL_SLUG = "journaling-and-healing"

[[rules]]
type = "Text"
globs = ["**/index.html", "**/style.css", "**/app.js", "**/theme.js"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["*.webp"]
fallthrough = true

# wrangler.toml (wrangler v3.88.0^)
[observability.logs]
enabled = true
